name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # criar GitHub Release
  packages: write   # push para ghcr.io

jobs:
  # ── Validação rápida antes de publicar ─────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements-dev.txt \
            -r atividade-1/backend/requirements.txt \
            -r atividade-2/backend/requirements.txt \
            -r atividade-3/backend/requirements.txt
      - name: Lint + type + test
        run: |
          python -m ruff check .
          python -m mypy --no-incremental --config-file mypy-atividade-1.ini
          python -m mypy --no-incremental --config-file mypy-atividade-2.ini
          python -m mypy --no-incremental --config-file mypy-atividade-3.ini
          python -m pytest

  # ── Build e push das imagens Docker para ghcr.io ───────────────────────────
  docker:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - activity: atividade-1
            port: 8001
          - activity: atividade-2
            port: 8002
          - activity: atividade-3
            port: 8003

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/corecraft-${{ matrix.activity }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.activity }}/Dockerfile
          build-args: APP_PORT=${{ matrix.port }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.activity }}
          cache-to: type=gha,mode=max,scope=${{ matrix.activity }}

  # ── GitHub Release com excerpt do CHANGELOG ────────────────────────────────
  release:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extrai o bloco entre ## [X.Y.Z] e o próximo ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [[ -z "$NOTES" ]]; then
            NOTES="Consulte o [CHANGELOG](CHANGELOG.md) para detalhes."
          fi
          # Exporta multi-linha de forma segura
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CoreCraft v${{ steps.version.outputs.version }}"
          body: |
            ## O que mudou

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Imagens Docker

            ```bash
            docker pull ghcr.io/btcneves/corecraft-atividade-1:${{ steps.version.outputs.version }}
            docker pull ghcr.io/btcneves/corecraft-atividade-2:${{ steps.version.outputs.version }}
            docker pull ghcr.io/btcneves/corecraft-atividade-3:${{ steps.version.outputs.version }}
            ```

            Ou use `:latest` para a versão mais recente.

            ## Início rápido

            ```bash
            git clone https://github.com/btcneves/CoreCraft.git
            cd corecraft
            ./scripts/quickstart.sh   # Linux / macOS
            docker compose up
            ```

            Guia completo: [docs/getting-started.md](docs/getting-started.md)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
