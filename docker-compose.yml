services:
  atividade-1:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./atividade-1/backend:/app
      - ./atividade-1/frontend:/frontend
      - ./atividade-1/.env:/app/.env:ro
    command: >
      sh -c "pip install -r requirements.txt -q &&
             uvicorn app.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    extra_hosts:
      # Permite que cada container resolva "host.docker.internal" para o host
      # onde o bitcoind está rodando. Configure cada atividade-*/.env para
      # BTC_RPC_HOST=host.docker.internal (e os endpoints ZMQ na Atividade 2).
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1

