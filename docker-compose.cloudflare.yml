services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: corecraft-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy:
        condition: service_started
    networks:
      - corecraft
    profiles:
      - cloudflare

